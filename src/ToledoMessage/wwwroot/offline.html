<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toledo Message — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.6;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1976d2;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 24px;
        }
        .retry-btn {
            display: inline-block;
            padding: 12px 32px;
            background-color: #1976d2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
        .retry-btn:hover {
            background-color: #1565c0;
        }
        .lang-ar { display: none; direction: rtl; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1 class="lang-en">You're Offline</h1>
        <h1 class="lang-ar">أنت غير متصل</h1>
        <p class="lang-en">Toledo Message needs an internet connection to send and receive messages. Please check your connection and try again.</p>
        <p class="lang-ar">يحتاج Toledo Message إلى اتصال بالإنترنت لإرسال واستقبال الرسائل. يرجى التحقق من اتصالك والمحاولة مرة أخرى.</p>
        <button class="retry-btn lang-en" onclick="window.location.reload()">Retry</button>
        <button class="retry-btn lang-ar" onclick="window.location.reload()">إعادة المحاولة</button>
    </div>
    <script>
        (function () {
            var culture = 'en';
            try { culture = localStorage.getItem('app.culture') || 'en'; } catch (e) { }
            var isAr = culture.startsWith('ar');
            var show = isAr ? 'ar' : 'en';
            var hide = isAr ? 'en' : 'ar';
            if (isAr) {
                document.documentElement.lang = 'ar';
                document.documentElement.dir = 'rtl';
            }
            var els = document.querySelectorAll('.lang-' + show);
            var i;
            for (i = 0; i < els.length; i++) els[i].style.display = '';
            els = document.querySelectorAll('.lang-' + hide);
            for (i = 0; i < els.length; i++) els[i].style.display = 'none';
        })();
    </script>
</body>
</html>
